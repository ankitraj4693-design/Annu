<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anjali</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #141414, #000000);
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  color: white;
}

.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(255, 0, 128, 0.15);
  border-radius: 50%;
  filter: blur(120px);
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 1; }
}

.container {
  text-align: center;
  z-index: 2;
  padding: 20px;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 5rem;
  color: #ff4da6;
  text-shadow:
    0 0 10px #ff4da6,
    0 0 20px #ff4da6,
    0 0 40px #ff1a8c,
    0 0 80px #ff1a8c;
  animation: flicker 2.5s infinite alternate;
}

@keyframes flicker {
  from { opacity: 0.9; }
  to { opacity: 1; }
}

p {
  margin-top: 12px;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: 1px;
}

.heart {
  margin-top: 25px;
  font-size: 2rem;
  color: #ff4d88;
  animation: heartbeat 1.2s infinite;
  cursor: pointer;
}

@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  25% { transform: scale(1.2); }
  50% { transform: scale(0.95); }
  75% { transform: scale(1.15); }
}

.secret {
  position: absolute;
  bottom: 18px;
  right: 24px;
  font-size: 0.9rem;
  opacity: 0.35;
  letter-spacing: 2px;
}

.floating-heart {
  position: absolute;
  color: rgba(255, 77, 136, 0.5);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  to {
    transform: translateY(-120vh) scale(1.2);
    opacity: 0;
  }
}

  </style>
</head>
<body>
  <div class="glow"></div>  <div class="container">
    <h1>Anjali</h1>
    <p>Thanks for existing ✨</p>
    <div class="heart" onclick="showMessage()">❤</div>
  </div>  <div class="secret">— A</div>  <script>
    function showMessage() {
      alert('You make ordinary moments feel special. ❤️');
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('floating-heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    setInterval(createHeart, 700);
  </script></body>
</html>
